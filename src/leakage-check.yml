name: ML Leakage Check

on: [push, pull_request]

jobs:
  detect-leakage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Package
        run: |
          pip install .

      - name: Run Leakage Detector
        run: |
          ml-leakage-detector .